name: Test Go
on:
  - push
jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: reportd
          POSTGRES_PASSWORD: reportd
          POSTGRES_DB: reportd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reportd -d reportd_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://reportd:reportd@localhost:5432/reportd_test?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install dependencies
        run: go get .
      - name: Build
        run: go build -v ./...
      - name: Test with the Go CLI
        run: go test -v ./...
